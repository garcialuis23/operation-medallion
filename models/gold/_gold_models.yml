version: 2

models:
  # ── DIMENSIONES ─────────────────────────────────────────────────────
  - name: dim_fecha
    description: >
      Dimensión temporal (año). Atributos: era OTAN, década, siglo, flags.
      Generada desde UNION de años de todas las fuentes Silver.
    columns:
      - name: anio
        tests: [not_null, unique]
      - name: era_otan
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Pre-OTAN', 'Guerra Fría', 'Post-Guerra Fría', 'Expansión Este', 'Era Actual']

  - name: dim_region
    description: >
      Regiones geográficas OTAN. UNION de regiones de países y zonas de operación.
      Atributos: zona_geografica, es_flanco_este, es_norte_america.
    columns:
      - name: region
        tests: [not_null, unique]

  - name: dim_pais
    description: >
      Países miembros OTAN. Snapshot versión actual SCD-2 (es_registro_actual = true).
      PK: pais_sk (surrogate). codigo_iso conservado como clave de negocio.
      Atributos enriquecidos: generacion_otan, perfil_nucleo, zona_geografica (de dim_region).
    columns:
      - name: pais_sk
        tests: [not_null, unique]
      - name: codigo_iso
        tests: [not_null, unique]
      - name: pais
        tests: [not_null]
      - name: region
        tests: [not_null]
      - name: generacion_otan
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Miembro Fundador', 'Primera Expansión', 'Expansión Post-GF', 'Expansión Este', 'Desconocido']

  - name: dim_mision
    description: >
      Misiones OTAN. Snapshot versión actual SCD-2.
      PK: mision_sk (surrogate). id_mision conservado como clave de negocio.
      Desnormaliza región/zona (via stg_cat_ubicacion_operacion), estado/resultado (via dim_estado_mision),
      país líder (via dim_pais), fechas e histórico de era OTAN (via dim_fecha).
      tipo_liderazgo varchar: "NATO" / "Non-NATO" / "Joint UN-NATO".
    columns:
      - name: mision_sk
        tests: [not_null, unique]
      - name: id_mision
        tests: [not_null, unique]
      - name: nombre_mision
        tests: [not_null]
      - name: tipo_liderazgo
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['NATO', 'Non-NATO', 'Joint UN-NATO']

  - name: dim_equipamiento
    description: >
      Tipos de equipamiento militar. Jerarquía snowflake: tipo → categoría → dominio.
      es_estandar_otan (varchar: Yes/Partial/No) y es_interoperable movidos desde inventario a v10.
      Atributos derivados: estandarizacion_es, nivel_integracion_otan, dominio_es.
    columns:
      - name: tipo_equipamiento
        tests: [not_null, unique]
      - name: dominio
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Air', 'Land', 'Sea', 'Support']
      - name: es_estandar_otan
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Yes', 'No', 'Partial']

  - name: dim_estado_mision
    description: >
      Combinaciones (fase_mision, estado_mision, resultado_mision) con traducciones al español.
    columns:
      - name: fase_mision
        tests: [not_null]

  - name: dim_rol_participacion
    description: >
      Roles de participación en misiones OTAN. Atributos: categoria_rol, es_rol_liderazgo.
    columns:
      - name: rol_participacion
        tests: [not_null, unique]

  # ── TABLAS DE HECHOS ─────────────────────────────────────────────────
  - name: fct_gasto_defensa
    description: >
      Gasto en defensa por país y año. Granularidad: (pais_sk, anio).
      FK: pais_sk → dim_pais. Calculados en Gold: pib_per_capita_usd, defensa_pct_pib,
      cumple_objetivo_2pct, gasto_defensa_per_capita_usd.
    columns:
      - name: pais_sk
        tests: [not_null]
      - name: codigo_iso
        tests: [not_null]
      - name: anio
        tests: [not_null]
      - name: estado_objetivo_2pct
        tests:
          - accepted_values:
              arguments:
                values: ['Cumple Objetivo', 'Bajo Objetivo']

  - name: fct_capacidad_militar
    description: >
      Capacidad militar por país y año. Granularidad: (pais_sk, anio).
      personal_total calculado en Gold. Ratios: pct_fuerzas_activas, militares_por_1000_hab.
    columns:
      - name: pais_sk
        tests: [not_null]
      - name: codigo_iso
        tests: [not_null]
      - name: anio
        tests: [not_null]

  - name: fct_inventario_equipamiento
    description: >
      Inventario de equipamiento por (pais_sk, tipo_equipamiento). Estado actual (SCD-2).
      Calculados: valor_total_m_usd, antiguedad_anos, estado_readiness, generacion_equipo.
      es_estandar_otan e es_interoperable vienen de dim_equipamiento (movidos en v10).
    columns:
      - name: pais_sk
        tests: [not_null]
      - name: codigo_iso
        tests: [not_null]
      - name: tipo_equipamiento
        tests: [not_null]
      - name: estado_readiness
        tests:
          - accepted_values:
              arguments:
                values: ['Óptimo', 'Bueno', 'Aceptable', 'Crítico']

  - name: fct_misiones
    description: >
      Hechos a nivel misión. Granularidad: un registro por misión (versión actual SCD-2).
      Tropas/activos/países: AGREGADOS desde fct_participacion_misiones.
      bajas + coste_mision_m_usd: hechos directos de CSV3.
      Calculados: pct_bajas, coste_por_soldado_usd, duracion_anos, coste_anual_m_usd.
    columns:
      - name: mision_sk
        tests: [not_null, unique]
      - name: id_mision
        tests: [not_null, unique]
      - name: nombre_mision
        tests: [not_null]

  - name: fct_participacion_misiones
    description: >
      Participación de países en misiones. Granularidad: (mision_sk, pais_sk, rol_participacion).
      FK: mision_sk → dim_mision, pais_sk → dim_pais. Desnormaliza atributos clave de ambas dims.
      pct_contribucion_tropas calculado sobre SUM de tropas de la misión.
      Corrige bug anterior: soporta multi-rol (un país puede tener varios roles en la misma misión).
    columns:
      - name: participacion_sk
        tests: [not_null, unique]
      - name: mision_sk
        tests: [not_null]
      - name: pais_sk
        tests: [not_null]
      - name: id_mision
        tests: [not_null]
      - name: codigo_iso
        tests: [not_null]

  - name: fct_despliegue_equipamiento
    description: >
      Equipamiento desplegado por misión y país. DATO INFERIDO/APROXIMADO.
      Inferido cruzando activos aéreos/navales de CSV4 con inventario CSV2 por dominio.
      Granularidad: (mision_sk, pais_sk, tipo_equipamiento) — UNIQUE.
      Desnormaliza atributos de dim_mision, dim_pais, dim_equipamiento.
    columns:
      - name: id_despliegue
        tests: [not_null, unique]
      - name: mision_sk
        tests: [not_null]
      - name: pais_sk
        tests: [not_null]
      - name: tipo_equipamiento
        tests: [not_null]
      - name: cantidad_desplegada
        tests: [not_null]
