version: 2

models:
  - name: bronze_country_stats
    description: "Capa Bronze de estadísticas de países OTAN. TRIM en texto, UPPER en booleanos. Sin casteo de tipos."
    config:
      materialized: table
    columns:
      - name: record_id
        tests: [not_null, unique]
      - name: country
        tests: [not_null]
      - name: iso_code
        tests: [not_null]
      - name: year
        tests: [not_null]
      - name: _loaded_at
        tests: [not_null]

  - name: bronze_equipment_inventory
    description: "Capa Bronze de inventario de equipamiento OTAN. TRIM en texto, UPPER en operational_status/nato_standardized/interoperable."
    config:
      materialized: table
    columns:
      - name: record_id
        tests: [not_null, unique]
      - name: country
        tests: [not_null]
      - name: iso_code
        tests: [not_null]
      - name: equipment_type
        tests: [not_null]
      - name: domain
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Air', 'Land', 'Sea', 'Support']
      - name: _loaded_at
        tests: [not_null]

  - name: bronze_operations_missions
    description: "Capa Bronze de operaciones y misiones OTAN. TRIM en texto, UPPER en nato_led/un_mandate."
    config:
      materialized: table
    columns:
      - name: record_id
        tests: [not_null, unique]
      - name: mission_name
        tests: [not_null]
      - name: lead_country
        tests: [not_null]
      - name: _loaded_at
        tests: [not_null]

  - name: bronze_mission_participants
    description: "Capa Bronze de participantes en misiones OTAN. TRIM en campos de texto."
    config:
      materialized: table
    columns:
      - name: participant_id
        tests: [not_null, unique]
      - name: mission_record_id
        tests: [not_null]
      - name: country
        tests: [not_null]
      - name: _loaded_at
        tests: [not_null]
