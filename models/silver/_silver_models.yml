version: 2

models:
  - name: silver_country
    description: "Países únicos acreditados con al menos una medalla en París 2024."
    columns:
      - name: wikidata_id_pais
        tests: [not_null, unique]
      - name: nombre
        tests: [not_null]

  - name: silver_delegation
    description: "Delegaciones olímpicas únicas. Un país puede organizar más de una delegación."
    columns:
      - name: wikidata_id_delegacion
        tests: [not_null, unique]
      - name: wikidata_id_pais
        tests:
          - name: not_null
            config:
              severity: warn
          - relationships:
              arguments:
                to: ref('silver_country')
                field: wikidata_id_pais

  - name: silver_sport
    description: "Deportes únicos representados en los JJ.OO. París 2024."
    columns:
      - name: wikidata_id_deporte
        tests: [not_null, unique]
      - name: nombre
        tests: [not_null]

  - name: silver_discipline
    description: "Disciplinas (agrupaciones de eventos) dentro de un deporte."
    columns:
      - name: wikidata_id_disciplina
        tests: [not_null, unique]
      - name: wikidata_id_deporte
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_sport')
                field: wikidata_id_deporte

  - name: silver_event
    description: "Eventos concretos en los que se otorga una medalla."
    columns:
      - name: wikidata_id_evento
        tests: [not_null, unique]
      - name: nombre
        tests: [not_null]

  - name: silver_nuts_region
    description: "Jerarquía NUTS europea (niveles 0-3). Tabla auto-jerárquica con id_nuts_padre."
    columns:
      - name: id_nuts
        tests: [not_null, unique]
      - name: nivel
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1, 2, 3]

  - name: silver_place
    description: "Lugares de nacimiento únicos de los atletas. id_nuts3 nullable para no europeos."
    columns:
      - name: wikidata_id_lugar
        tests: [not_null, unique]
      - name: nombre
        tests:
          - name: not_null
            config:
              severity: warn
    description: "Atletas únicos que ganaron al menos una medalla en París 2024."
    columns:
      - name: wikidata_id_atleta
        tests: [not_null, unique]
      - name: nombre
        tests: [not_null]
      - name: wikidata_id_lugar
        tests:
          - relationships:
              arguments:
                to: ref('silver_place')
                field: wikidata_id_lugar

  - name: silver_medal
    description: "Tabla de hechos Silver: una fila por medalla (wikidata_id_atleta × wikidata_id_evento es única)."
    columns:
      - name: id_medalla
        tests: [not_null, unique]
      - name: wikidata_id_atleta
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_athlete')
                field: wikidata_id_atleta
      - name: wikidata_id_evento
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_event')
                field: wikidata_id_evento
      - name: wikidata_id_delegacion
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_delegation')
                field: wikidata_id_delegacion
      - name: wikidata_id_pais
        tests:
          - name: not_null
            config:
              severity: warn
          - relationships:
              arguments:
                to: ref('silver_country')
                field: wikidata_id_pais
      - name: tipo
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['gold', 'silver', 'bronze']
